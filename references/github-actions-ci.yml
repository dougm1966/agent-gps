name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile Python
        run: python -m py_compile agent_gps.py scripts/agent_gps.py test_agent_gps.py scripts/validate_skill.py

      - name: Validate skill package
        run: python scripts/validate_skill.py .

      - name: Run tests
        run: python -m unittest test_agent_gps.py
